# swww configuration
# https://github.com/Horus645/swww

# Transition type: none | simple | fade | left | right | top | bottom | wave | grow | center | any | random
transition_type = grow

# Transition duration in seconds
transition_duration = 1.5

# Transition FPS
transition_fps = 60

# Transition step (higher = faster transition, lower = smoother)
transition_step = 4

# Image filter: linear | nearest | catmullrom
filter = catmullrom

# Wallpaper path
wallpaper = /home/hypr/.config/hypr/wallpaper/Space-Nebula.png

# Monitor (empty = all monitors)
# monitor = HDMI-A-1
